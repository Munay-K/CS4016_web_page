<!DOCTYPE html><html lang="es"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Calculadora de Nota Final | Computación Gráfica</title><link rel="stylesheet" href="/CS4016_web_page/_astro/_slug_.BmAVGTu2.css"></head> <body class="bg-white text-gray-800 font-sans"> <!-- Header --> <header class="bg-gray-900 text-white shadow"> <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between"> <h1 class="text-xl font-semibold">CS4016 | Computación Gráfica</h1> <nav class="space-x-4 text-sm"> <a href="/" class="hover:underline text-gray-300 hover:text-white">Inicio</a> <a href="/sobre" class="hover:underline text-gray-300 hover:text-white">Sobre el curso</a> <a href="/proyectos" class="hover:underline text-gray-300 hover:text-white">Proyectos</a> <a href="/cronograma" class="hover:underline text-gray-300 hover:text-white">Cronograma</a> <a href="/contacto" class="hover:underline text-gray-300 hover:text-white">Contacto</a> </nav> </div> </header> <!-- Contenido --> <main class="prose prose-lg max-w-4xl mx-auto px-4 py-10">  <section class="prose mx-auto my-8"> <h2>Calculadora de Nota Final</h2> <p>Introduce tus notas (entre 0 y 20) para estimar tu promedio final en el curso:</p> <form id="gradeCalculator" class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-6"> <div> <label for="e1" class="font-semibold">Examen Teórico E1 (15%)</label> <input type="number" id="e1" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div> <label for="e2" class="font-semibold">Examen Teórico E2 (15%)</label> <input type="number" id="e2" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div> <label for="pc1" class="font-semibold">Práctica Calificada PC1 (2.5%)</label> <input type="number" id="pc1" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div> <label for="pc2" class="font-semibold">Práctica Calificada PC2 (2.5%)</label> <input type="number" id="pc2" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div> <label for="pc3" class="font-semibold">Práctica Calificada PC3 (2.5%)</label> <input type="number" id="pc3" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div> <label for="pc4" class="font-semibold">Práctica Calificada PC4 (2.5%)</label> <input type="number" id="pc4" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div> <label for="p1" class="font-semibold">Proyecto P1 (10%)</label> <input type="number" id="p1" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div> <label for="p2" class="font-semibold">Proyecto P2 (40%)</label> <input type="number" id="p2" class="input border border-gray-300 p-2 w-full" placeholder="Nota de 0 a 20"> </div> <div class="col-span-full flex flex-col items-center mt-4"> <button type="button" id="calcular-btn" class="px-6 py-2 rounded bg-blue-600 text-white hover:bg-blue-700 transition">
Calcular Nota Final
</button> <h3 id="resultado" class="mt-4 text-lg font-bold"></h3> </div> </form> </section> <script>
  window.addEventListener('load', () => {
    const btn = document.getElementById('calcular-btn');
    btn.addEventListener('click', () => {
      const campos = ['e1', 'e2', 'pc1', 'pc2', 'pc3', 'pc4', 'p1', 'p2'];
      let notas = {};

      for (let campo of campos) {
        const valor = parseFloat(document.getElementById(campo).value);
        if (isNaN(valor) || valor < 0 || valor > 20) {
          alert('⚠️ Error: Todas las notas deben estar entre 0 y 20.');
          return;
        }
        notas[campo] = valor;
      }

      const teoria = (notas.e1 * 0.5) + (notas.e2 * 0.5);
      const practicas = (notas.pc1 + notas.pc2 + notas.pc3 + notas.pc4) / 4;
      const proyecto = (notas.p1 * 0.2) + (notas.p2 * 0.8);

      const notaFinal = (teoria * 0.30) + (practicas * 0.20) + (proyecto * 0.50);

      let mensaje = `
✅ Resultados Parciales:<br><br>
- Nota de Teoría: ${teoria.toFixed(2)}/20<br>
- Nota de Prácticas Calificadas: ${practicas.toFixed(2)}/20<br>
- Nota de Proyecto: ${proyecto.toFixed(2)}/20<br><br>
🎯 Nota Final: ${notaFinal.toFixed(2)}/20<br><br>
`;

      if (teoria < 11 || practicas < 11 || proyecto < 11) {
        mensaje += "❌ <strong>No aprobado</strong>: debes obtener al menos 11/20 en cada sección.";
        document.getElementById('resultado').style.color = 'red';
      } else {
        mensaje += "✅ <strong>¡Aprobaste todas las secciones!</strong>";
        document.getElementById('resultado').style.color = 'green';
      }

      document.getElementById('resultado').innerHTML = mensaje;
    });
  });
</script>  </main> <!-- Footer --> <footer class="bg-gray-100 py-6 mt-12"> <div class="flex flex-col items-center justify-center space-y-2"> <p class="text-sm text-gray-600">&copy; 2025 Universidad de Ingeniería y Tecnología – UTEC</p> <div class="flex space-x-4 text-gray-500 text-xl"> <a href="https://github.com/churchTao" target="_blank" class="hover:text-black">🐙</a> <a href="https://linkedin.com/in/..." target="_blank" class="hover:text-blue-700">💼</a> <a href="mailto:correo@ejemplo.com" class="hover:text-red-600">✉️</a> </div> </div> </footer> </body></html>
